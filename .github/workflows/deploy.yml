name: Deploy to Cloudflare

# Auto-deploy the Worker on every push to main. Requires a repo secret
# CLOUDFLARE_API_TOKEN (Cloudflare API token with "Edit Cloudflare Workers"
# permission). The account is pinned in wrangler.jsonc.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys if pushes land close together.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
